# Configuration for Cog ⚙️
# Reference: https://cog.run/yaml

build:
  gpu: true
  cuda: "12.1"
  python_version: "3.11"
  system_packages:
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
    - "git"
    - "wget"
  python_packages:
    - "torch==2.1.0"
    - "torchvision==0.16.0"
    - "transformers==4.35.0"
    - "pillow>=10.0.0"
    - "numpy<2"
    - "trimesh>=4.0.0"
    - "rembg[gpu]>=2.0.50"
    - "omegaconf>=2.3.0"
    - "einops>=0.7.0"
    - "pygltflib>=1.16.0"
    - "imageio[ffmpeg]"
    - "xatlas"
    - "moderngl"
    - "scikit-image"
  run:
    - "git clone https://github.com/VAST-AI-Research/TripoSR.git /tmp/TripoSR && cp -r /tmp/TripoSR/tsr ."
    - |
      python -c '
      import pathlib
      path = pathlib.Path("tsr/models/isosurface.py")
      content = """
      from typing import Callable, Optional, Tuple
      import numpy as np
      import torch
      import torch.nn as nn

      def marching_cubes_skimage(level_tensor: torch.Tensor, threshold: float = 0.0) -> Tuple[torch.Tensor, torch.Tensor]:
          from skimage import measure
          level_np = level_tensor.detach().cpu().numpy()
          verts, faces, _, _ = measure.marching_cubes(level_np, level=threshold)
          v_pos = torch.from_numpy(verts.copy()).float()
          t_pos_idx = torch.from_numpy(faces.copy()).long()
          return v_pos, t_pos_idx

      class IsosurfaceHelper(nn.Module):
          points_range: Tuple[float, float] = (0, 1)
          @property
          def grid_vertices(self) -> torch.FloatTensor:
              raise NotImplementedError

      class MarchingCubeHelper(IsosurfaceHelper):
          def __init__(self, resolution: int) -> None:
              super().__init__()
              self.resolution = resolution
              self.mc_func: Callable = marching_cubes_skimage
              self._grid_vertices: Optional[torch.FloatTensor] = None

          @property
          def grid_vertices(self) -> torch.FloatTensor:
              if self._grid_vertices is None:
                  x, y, z = (
                      torch.linspace(*self.points_range, self.resolution),
                      torch.linspace(*self.points_range, self.resolution),
                      torch.linspace(*self.points_range, self.resolution),
                  )
                  x, y, z = torch.meshgrid(x, y, z, indexing="ij")
                  verts = torch.cat(
                      [x.reshape(-1, 1), y.reshape(-1, 1), z.reshape(-1, 1)], dim=-1
                  ).reshape(-1, 3)
                  self._grid_vertices = verts
              return self._grid_vertices

          def forward(
              self,
              level: torch.FloatTensor,
          ) -> Tuple[torch.FloatTensor, torch.LongTensor]:
              level = -level.view(self.resolution, self.resolution, self.resolution)
              v_pos, t_pos_idx = self.mc_func(level, 0.0)
              v_pos = v_pos[..., [2, 1, 0]]
              v_pos = v_pos / (self.resolution - 1.0)
              return v_pos.to(level.device), t_pos_idx.to(level.device)
      """
      path.write_text(content.strip())
      '
    - "python -c 'from huggingface_hub import hf_hub_download; hf_hub_download(repo_id=\"stabilityai/TripoSR\", filename=\"config.yaml\"); hf_hub_download(repo_id=\"stabilityai/TripoSR\", filename=\"model.ckpt\")'"
    - "python -c 'from rembg import new_session; new_session(\"u2net\")'"

predict: "predict.py:Predictor"
